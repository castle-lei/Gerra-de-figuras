<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometric battle</title>
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="trail-container"></div>
<div id="green-container"></div>
<div id="sword-container"></div>
<div id="heart-container"></div>
<div id="triangle-container"></div>
<div id="others-container"></div>
<div id="square"></div>
<div id="info">&larr; &uarr; &darr; &rarr; mover el cuadrado</div>

<div id="health-bar"> 
  <div id="health-fill"></div>
  <span id="health-text">100</span>
</div>
<div id="sword-info"></div>

<div id="wave-announce"></div>

<div id="game-over-screen">
  <div id="game-over-box">
    <h1>Game Over</h1>
    <p>Llegaste a la Wave <span id="final-wave">1</span></p>
    <button id="restart-btn">Reiniciar</button>
  </div>
</div>

<div id="start-screen">
  <div id="start-box">
    <h1>Cuadrado Móvil</h1>
    <p>Usa las flechas del teclado para mover el cuadrado</p>
    <p>Consigue la espada para matar verdes</p>
    <button id="start-btn">Comenzar</button>
    <button id="customize-btn">Personalizar</button>
    <button id="mp-btn">Multijugador</button>
    <div id="customize-panel">
      <h3>Personalizar</h3>
      <label>Cuadrado: <input type="color" id="color-square" value="#f1c40f"></label>
      <label>Círculo: <input type="color" id="color-circle" value="#e94560"></label>
      <button id="customize-close">OK</button>
    </div>

    <div id="mp-lobby">
      <div id="mp-mode-select" class="mp-panel">
        <button id="mp-create-btn">Crear Sala</button>
        <button id="mp-join-btn">Unirse a Sala</button>
        <button id="mp-back-btn">Volver</button>
      </div>
      <div id="room-created" class="mp-panel" style="display:none">
        <p>Código de sala:</p>
        <div id="room-code-big">----</div>
        <button id="mp-start-btn">Iniciar Juego</button>
        <button id="mp-cancel-btn">Cancelar</button>
      </div>
      <div id="join-room" class="mp-panel" style="display:none">
        <input id="mp-room-input" type="text" maxlength="10" placeholder="Código de sala">
        <button id="mp-connect-btn">Conectar</button>
        <button id="mp-back-join-btn">Volver</button>
      </div>
      <div id="waiting-for-start" class="mp-panel" style="display:none">
        <p>Esperando a que el anfitrión inicie...</p>
        <button id="mp-leave-btn">Salir</button>
      </div>
    </div>

  </div>
</div>

<script src="comand.js"></script>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script src="multiplayer.js"></script>
</body>
</html>
